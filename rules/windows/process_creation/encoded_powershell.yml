title: Suspicious Encoded PowerShell Execution
id: f3b07a2d-1e94-4b5c-8d72-6a9ef4c5d8e1
status: test
level: high
description: Detects PowerShell execution with encoded or base64 commands, commonly used by attackers to obfuscate malicious scripts.
author: Paul Aguilera
date: 2026/06/04
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense-evasion
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        Image|endswith: '\powershell.exe'
    selection_encoding:
        CommandLine|contains:
            - '-enc'
            - '-EncodedCommand'
            - 'FromBase64String'
            - '-e JAB'
            - '-e IEX'
    condition: selection_process and selection_encoding
falsepositives:
    - Legitimate admin scripts using encoding for special characters
    - Some enterprise software installers
